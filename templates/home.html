<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Exam Performance Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4F46E5,#3B82F6,#06B6D4);
    padding:40px;
}

.container{
    width:100%;
    max-width:750px;
}

.card{

    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
    border:1px solid rgba(255,255,255,.2);
}

.title{
    text-align:center;
    color:#fff;
    margin-bottom:10px;
    font-size:34px;
    font-weight:700;
}

.subtitle{
    text-align:center;
    color:#f1f1f1;
    margin-bottom:35px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#fff;
    font-weight:500;
}

input,
select{

    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:10px;
    font-size:15px;
    background:#fff;
    transition:.3s;
}

input:focus,
select:focus{

    box-shadow:0 0 10px #60A5FA;
    transform:scale(1.02);
}

.btn{

    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2563EB;
    color:#fff;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{

    background:#1D4ED8;
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.result{

    margin-top:30px;
    padding:20px;
    text-align:center;
    background:#ffffff;
    border-radius:15px;
}

.result h2{

    color:#2563EB;
    margin-bottom:10px;
}

.result p{

    font-size:26px;
    font-weight:700;
    color:#111827;
}

.footer{

    margin-top:20px;
    text-align:center;
    color:#fff;
    font-size:14px;
}

@media(max-width:768px){

.card{

padding:25px;

}

.title{

font-size:28px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1 class="title">📚 Student Exam Performance Predictor</h1>

<p class="subtitle">
Predict the Mathematics Score using student information
</p>

<form action="{{ url_for('predict_datapoint') }}" method="post">

<div class="form-group">
<label>Gender</label>

<select name="gender" required>

<option selected disabled value="">Select Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>

</select>

</div>


<div class="form-group">
<label>Race / Ethnicity</label>

<select name="race_ethnicity" required>

<option selected disabled value="">Select Group</option>
<option value="group A">Group A</option>
<option value="group B">Group B</option>
<option value="group C">Group C</option>
<option value="group D">Group D</option>
<option value="group E">Group E</option>

</select>

</div>


<div class="form-group">
<label>Parental Level of Education</label>

<select name="parental_level_of_education" required>

<option selected disabled value="">Select Education</option>
<option value="associate's degree">Associate's Degree</option>
<option value="bachelor's degree">Bachelor's Degree</option>
<option value="high school">High School</option>
<option value="master's degree">Master's Degree</option>
<option value="some college">Some College</option>
<option value="some high school">Some High School</option>

</select>

</div>


<div class="form-group">
<label>Lunch Type</label>

<select name="lunch" required>

<option selected disabled value="">Select Lunch Type</option>
<option value="standard">Standard</option>
<option value="free/reduced">Free / Reduced</option>

</select>

</div>


<div class="form-group">
<label>Test Preparation Course</label>

<select name="test_preparation_course" required>

<option selected disabled value="">Select Course</option>
<option value="completed">Completed</option>
<option value="none">None</option>

</select>

</div>


<div class="form-group">

<label>Reading Score (0-100)</label>

<input
type="number"
name="reading_score"
min="0"
max="100"
placeholder="Enter Reading Score"
required>

</div>


<div class="form-group">

<label>Writing Score (0-100)</label>

<input
type="number"
name="writing_score"
min="0"
max="100"
placeholder="Enter Writing Score"
required>

</div>


<button class="btn" type="submit">

🎯 Predict Mathematics Score

</button>

</form>

{% if results %}

<div class="result">

<h2>Prediction Result</h2>

<p>{{ results }}</p>

</div>

{% endif %}

<div class="footer">

</div>

</div>

</div>

</body>
</html>
