<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4F46E5,#3B82F6,#06B6D4);
            overflow:hidden;
        }

        .container{

            text-align:center;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(15px);
            padding:60px;
            border-radius:20px;
            width:700px;
            color:white;
            box-shadow:0 15px 35px rgba(0,0,0,.25);

        }

        h1{

            font-size:42px;
            margin-bottom:20px;

        }

        p{

            font-size:18px;
            margin-bottom:40px;
            line-height:1.8;

        }

        .btn{

            display:inline-block;
            text-decoration:none;
            background:white;
            color:#2563EB;
            padding:15px 35px;
            border-radius:10px;
            font-size:18px;
            font-weight:600;
            transition:.3s;

        }

        .btn:hover{

            transform:translateY(-4px);
            box-shadow:0 10px 25px rgba(0,0,0,.25);

        }

        .emoji{

            font-size:70px;
            margin-bottom:20px;

        }

    </style>

</head>

<body>

<div class="container">

    <div class="emoji">🎓</div>

    <h1>Student Exam Performance Predictor</h1>

    <p>
        Welcome! This Machine Learning application predicts a student's
        Mathematics score based on demographic information, reading score,
        writing score, and other academic factors.
    </p>

    <a href="{{ url_for('predict_datapoint') }}" class="btn">
        🚀 Start Prediction
    </a>

</div>

</body>
</html>
